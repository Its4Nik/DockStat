name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 0" # weekly Sunday 03:00 UTC
  push:
    branches: [main]
    paths:
      - "packages/validator/**"

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build native library
        run: |
          cd packages/validator
          cargo build --lib --release
          cp target/release/libvalidator.* .

      - uses: oven-sh/setup-bun@v2

      - name: Install benchmark dependencies
        run: |
          cd packages/validator/benchmarks
          bun install --no-save

      - name: Run benchmarks
        run: |
          cd packages/validator/benchmarks
          bun run bench

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/validator/benchmarks/README.md
          git commit -m "bench(ci): update benchmark results [skip ci]" || exit 0
          git push
