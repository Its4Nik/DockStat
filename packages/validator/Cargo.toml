[package]
name = "validator"
version = "0.1.0"
edition = "2021"
description = "High-performance JSON Schema validation engine with FFI interface"

[lib]
name = "validator"
crate-type = ["cdylib"]
path = "native/src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
jsonschema = { version = "0.22", default-features = true }

[profile.release]
opt-level = 3
lto = true
strip = true
