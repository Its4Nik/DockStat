openapi: 3.0.1
info:
  title: Docker Engine API
  description: |
    The Engine API is an HTTP API served by Docker Engine. It is the API the
    Docker client uses to communicate with the Engine, so everything the Docker
    client can do can be done with the API.

    Most of the client's commands map directly to API endpoints (e.g. `docker ps`
    is `GET /containers/json`). The notable exception is running containers,
    which consists of several API calls.

    # Errors

    The API uses standard HTTP status codes to indicate the success or failure
    of the API call. The body of the response will be JSON in the following
    format:

    ```
    {
      "message": "page not found"
    }
    ```

    # Versioning

    The API is usually changed in each release, so API calls are versioned to
    ensure that clients don't break. To lock to a specific version of the API,
    you prefix the URL with its version, for example, call `/v1.30/info` to use
    the v1.30 version of the `/info` endpoint. If the API version specified in
    the URL is not supported by the daemon, a HTTP `400 Bad Request` error message
    is returned.

    If you omit the version-prefix, the current version of the API (v1.50) is used.
    For example, calling `/info` is the same as calling `/v1.52/info`. Using the
    API without a version-prefix is deprecated and will be removed in a future release.

    Engine releases in the near future should support this version of the API,
    so your client will continue to work even if it is talking to a newer Engine.

    The API uses an open schema model, which means the server may add extra properties
    to responses. Likewise, the server will ignore any extra query parameters and
    request body properties. When you write clients, you need to ignore additional
    properties in responses to ensure they do not break when talking to newer
    daemons.


    # Authentication

    Authentication for registries is handled client side. The client has to send
    authentication details to various endpoints that need to communicate with
    registries, such as `POST /images/(name)/push`. These are sent as
    `X-Registry-Auth` header as a [base64url encoded](https://tools.ietf.org/html/rfc4648#section-5)
    (JSON) string with the following structure:

    ```
    {
      "username": "string",
      "password": "string",
      "serveraddress": "string"
    }
    ```

    The `serveraddress` is a domain/IP without a protocol. Throughout this
    structure, double quotes are required.

    If you have already got an identity token from the [`/auth` endpoint](#operation/SystemAuth),
    you can just pass this instead of credentials:

    ```
    {
      "identitytoken": "9cbaf023786cd7..."
    }
    ```
  version: "1.54"
  x-logo:
    url: https://docs.docker.com/assets/images/logo-docker-main.png
servers:
  - url: /v1.54
tags:
  - name: Container
    description: |
      Create and manage containers.
    x-displayName: Containers
  - name: Image
    x-displayName: Images
  - name: Network
    description: |
      Networks are user-defined networks that containers can be attached to.
      See the [networking documentation](https://docs.docker.com/network/)
      for more information.
    x-displayName: Networks
  - name: Volume
    description: |
      Create and manage persistent storage that can be attached to containers.
    x-displayName: Volumes
  - name: Exec
    description: |
      Run new commands inside running containers. Refer to the
      [command-line reference](https://docs.docker.com/engine/reference/commandline/exec/)
      for more information.

      To exec a command in a container, you first need to create an exec instance,
      then start it. These two API endpoints are wrapped up in a single command-line
      command, `docker exec`.
    x-displayName: Exec
  - name: Swarm
    description: |
      Engines can be clustered together in a swarm. Refer to the
      [swarm mode documentation](https://docs.docker.com/engine/swarm/)
      for more information.
    x-displayName: Swarm
  - name: Node
    description: |
      Nodes are instances of the Engine participating in a swarm. Swarm mode
      must be enabled for these endpoints to work.
    x-displayName: Nodes
  - name: Service
    description: |
      Services are the definitions of tasks to run on a swarm. Swarm mode must
      be enabled for these endpoints to work.
    x-displayName: Services
  - name: Task
    description: |
      A task is a container running on a swarm. It is the atomic scheduling unit
      of swarm. Swarm mode must be enabled for these endpoints to work.
    x-displayName: Tasks
  - name: Secret
    description: |
      Secrets are sensitive data that can be used by services. Swarm mode must
      be enabled for these endpoints to work.
    x-displayName: Secrets
  - name: Config
    description: |
      Configs are application configurations that can be used by services. Swarm
      mode must be enabled for these endpoints to work.
    x-displayName: Configs
  - name: Plugin
    x-displayName: Plugins
  - name: System
    x-displayName: System
paths:
  /containers/json:
    get:
      tags:
        - Container
      summary: List containers
      description: |
        Returns a list of containers. For details on the format, see the
        [inspect endpoint](#operation/ContainerInspect).

        Note that it uses a different, smaller representation of a container
        than inspecting a single container. For example, the list of linked
        containers is not propagated .
      operationId: ContainerList
      parameters:
        - name: all
          in: query
          description: |
            Return all containers. By default, only running containers are shown.
          schema:
            type: boolean
            default: false
        - name: limit
          in: query
          description: |
            Return this number of most recently created containers, including
            non-running ones.
          schema:
            type: integer
        - name: size
          in: query
          description: |
            Return the size of container as fields `SizeRw` and `SizeRootFs`.
          schema:
            type: boolean
            default: false
        - name: filters
          in: query
          description: |
            Filters to process on the container list, encoded as JSON (a
            `map[string][]string`). For example, `{"status": ["paused"]}` will
            only return paused containers.

            Available filters:

            - `ancestor`=(`<image-name>[:<tag>]`, `<image id>`, or `<image@digest>`)
            - `before`=(`<container id>` or `<container name>`)
            - `expose`=(`<port>[/<proto>]`|`<startport-endport>/[<proto>]`)
            - `exited=<int>` containers with exit code of `<int>`
            - `health`=(`starting`|`healthy`|`unhealthy`|`none`)
            - `id=<ID>` a container's ID
            - `isolation=`(`default`|`process`|`hyperv`) (Windows daemon only)
            - `is-task=`(`true`|`false`)
            - `label=key` or `label="key=value"` of a container label
            - `name=<name>` a container's name
            - `network`=(`<network id>` or `<network name>`)
            - `publish`=(`<port>[/<proto>]`|`<startport-endport>/[<proto>]`)
            - `since`=(`<container id>` or `<container name>`)
            - `status=`(`created`|`restarting`|`running`|`removing`|`paused`|`exited`|`dead`)
            - `volume`=(`<volume name>` or `<mount point destination>`)
          schema:
            type: string
      responses:
        "200":
          description: no error
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContainerSummary"
        "400":
          description: bad parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /containers/create:
    post:
      tags:
        - Container
      summary: Create a container
      operationId: ContainerCreate
      parameters:
        - name: name
          in: query
          description: |
            Assign the specified name to the container. Must match
            `/?[a-zA-Z0-9][a-zA-Z0-9_.-]+`.
          schema:
            pattern: "^/?[a-zA-Z0-9][a-zA-Z0-9_.-]+$"
            type: string
        - name: platform
          in: query
          description: |
            Platform in the format `os[/arch[/variant]]` used for image lookup.

            When specified, the daemon checks if the requested image is present
            in the local image cache with the given OS and Architecture, and
            otherwise returns a `404` status.

            If the option is not set, the host's native OS and Architecture are
            used to look up the image in the image cache. However, if no platform
            is passed and the given image does exist in the local image cache,
            but its OS or architecture does not match, the container is created
            with the available image, and a warning is added to the `Warnings`
            field in the response, for example;

                WARNING: The requested image's platform (linux/arm64/v8) does not
                         match the detected host platform (linux/amd64) and no
                         specific platform was requested
          schema:
            type: string
      requestBody:
        description: Container to create
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/ContainerConfig"
                - type: object
                  properties:
                    HostConfig:
                      $ref: "#/components/schemas/HostConfig"
                    NetworkingConfig:
                      $ref: "#/components/schemas/NetworkingConfig"
          application/octet-stream:
            schema:
              allOf:
                - $ref: "#/components/schemas/ContainerConfig"
                - type: object
                  properties:
                    HostConfig:
                      $ref: "#/components/schemas/HostConfig"
                    NetworkingConfig:
                      $ref: "#/components/schemas/NetworkingConfig"
        required: true
      responses:
        "201":
          description: Container created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerCreateResponse"
        "400":
          description: bad parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: no such image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "No such image: c2ada9df5af8"
        "409":
          description: conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
      x-codegen-request-body-name: body
  /containers/{id}/json:
    get:
      tags:
        - Container
      summary: Inspect a container
      description: Return low-level information about a container.
      operationId: ContainerInspect
      parameters:
        - name: id
          in: path
          description: ID or name of the container
          required: true
          schema:
            type: string
        - name: size
          in: query
          description: Return the size of container as fields `SizeRw` and `SizeRootFs`
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: no error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerInspectResponse"
        "404":
          description: no such container
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "No such container: c2ada9df5af8"
        "500":
          description: server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /containers/{id}/top:
    get:
      tags:
        - Container
      summary: List processes running inside a container
      description: |
        On Unix systems, this is done by running the `ps` command. This endpoint
        is not supported on Windows.
      operationId: ContainerTop
      parameters:
        - name: id
          in: path
          description: ID or name of the container
          required: true
          schema:
            type: string
        - name: ps_args
          in: query
          description: "The arguments to pass to `ps`. For example, `aux`"
          schema:
            type: string
            default: -ef
      responses:
        "200":
          description: no error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerTopResponse"
            text/plain:
              schema:
                $ref: "#/components/schemas/ContainerTopResponse"
        "404":
          description: no such container
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "No such container: c2ada9df5af8"
            text/plain:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            text/plain:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /containers/{id}/logs:
    get:
      tags:
        - Container
      summary: Get container logs
      description: |
        Get `stdout` and `stderr` logs from a container.

        Note: This endpoint works only for containers with the `json-file` or
        `journald` logging driver.
      operationId: ContainerLogs
      parameters:
        - name: id
          in: path
          description: ID or name of the container
          required: true
          schema:
            type: string
        - name: follow
          in: query
          description: Keep connection after returning logs.
          schema:
            type: boolean
            default: false
        - name: stdout
          in: query
          description: Return logs from `stdout`
          schema:
            type: boolean
            default: false
        - name: stderr
          in: query
          description: Return logs from `stderr`
          schema:
            type: boolean
            default: false
        - name: since
          in: query
          description: "Only return logs since this time, as a UNIX timestamp"
          schema:
            type: integer
            default: 0
        - name: until
          in: query
          description: "Only return logs before this time, as a UNIX timestamp"
          schema:
            type: integer
            default: 0
        - name: timestamps
          in: query
          description: Add timestamps to every log line
          schema:
            type: boolean
            default: false
        - name: tail
          in: query
          description: |
            Only return this number of log lines from the end of the logs.
            Specify as an integer or `all` to output all log lines.
          schema:
            type: string
            default: all
      responses:
        "200":
          description: |
            logs returned as a stream in response body.
            For the stream format, [see the documentation for the attach endpoint](#operation/ContainerAttach).
            Note that unlike the attach endpoint, the logs endpoint does not
            upgrade the connection and does not set Content-Type.
          content:
            application/vnd.docker.raw-stream:
              schema:
                type: string
                format: binary
            application/vnd.docker.multiplexed-stream:
              schema:
                type: string
                format: binary
        "404":
          description: no such container
          content:
            application/vnd.docker.raw-stream:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            application/vnd.docker.multiplexed-stream:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            application/json:
              example:
                message: "No such container: c2ada9df5af8"
        "500":
          description: server error
          content:
            application/vnd.docker.raw-stream:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            application/vnd.docker.multiplexed-stream:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /containers/{id}/changes:
    get:
      tags:
        - Container
      summary: Get changes on a container’s filesystem
      description: |
        Returns which files in a container's filesystem have been added, deleted,
        or modified. The `Kind` of modification can be one of:

        - `0`: Modified ("C")
        - `1`: Added ("A")
        - `2`: Deleted ("D")
      operationId: ContainerChanges
      parameters:
        - name: id
          in: path
          description: ID or name of the container
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The list of changes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FilesystemChange"
              example:
                - Path: /dev
                  Kind: 0
                - Path: /dev/kmsg
                  Kind: 1
                - Path: /test
                  Kind: 1
        "404":
          description: no such container
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "No such container: c2ada9df5af8"
        "500":
          description: server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /containers/{id}/export:
    get:
      tags:
        - Container
      summary: Export a container
      description: Export the contents of a container as a tarball.
      operationId: ContainerExport
      parameters:
        - name: id
          in: path
          description: ID or name of the container
          required: true
          schema:
            type: string
      responses:
        "200":
          description: no error
          content: {}
        "404":
          description: no such container
          content:
            application/octet-stream:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            application/json:
              example:
                message: "No such container: c2ada9df5af8"
        "500":
          description: server error
          content:
            application/octet-stream:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /containers/{id}/stats:
    get:
      tags:
        - Container
      summary: Get container stats based on resource usage
      description: |
        This endpoint returns a live stream of a container’s resource usage
        statistics.

        The `precpu_stats` is the CPU statistic of the *previous* read, and is
        used to calculate the CPU usage percentage. It is not an exact copy
        of the `cpu_stats` field.

        If either `precpu_stats.online_cpus` or `cpu_stats.online_cpus` is
        nil then for compatibility with older daemons the length of the
        corresponding `cpu_usage.percpu_usage` array should be used.

        On a cgroup v2 host, the following fields are not set
        * `blkio_stats`: all fields other than `io_service_bytes_recursive`
        * `cpu_stats`: `cpu_usage.percpu_usage`
        * `memory_stats`: `max_usage` and `failcnt`
        Also, `memory_stats.stats` fields are incompatible with cgroup v1.

        To calculate the values shown by the `stats` command of the docker cli tool
        the following formulas can be used:
        * used_memory = `memory_stats.usage - memory_stats.stats.cache` (cgroups v1)
        * used_memory = `memory_stats.usage - memory_stats.stats.inactive_file` (cgroups v2)
        * available_memory = `memory_stats.limit`
        * Memory usage % = `(used_memory / available_memory) * 100.0`
        * cpu_delta = `cpu_stats.cpu_usage.total_usage - precpu_stats.cpu_usage.total_usage`
        * system_cpu_delta = `cpu_stats.system_cpu_usage - precpu_stats.system_cpu_usage`
        * number_cpus = `length(cpu_stats.cpu_usage.percpu_usage)` or `cpu_stats.online_cpus`
        * CPU usage % = `(cpu_delta / system_cpu_delta) * number_cpus * 100.0`
      operationId: ContainerStats
      parameters:
        - name: id
          in: path
          description: ID or name of the container
          required: true
          schema:
            type: string
        - name: stream
          in: query
          description: |
            Stream the output. If false, the stats will be output once and then
            it will disconnect.
          schema:
            type: boolean
            default: true
        - name: one-shot
          in: query
          description: |
            Only get a single stat instead of waiting for 2 cycles. Must be used
            with `stream=false`.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: no error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerStatsResponse"
        "404":
          description: no such container
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "No such container: c2ada9df5af8"
        "500":
          description: server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /containers/{id}/resize:
    post:
      tags:
        - Container
      summary: Resize a container TTY
      description: Resize the TTY for a container.
      operationId: ContainerResize
      parameters:
        - name: id
          in: path
          description: ID or name of the container
          required: true
          schema:
            type: string
        - name: h
          in: query
          description: Height of the TTY session in characters
          required: true
          schema:
            type: integer
        - name: w
          in: query
          description: Width of the TTY session in characters
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: no error
          content: {}
        "404":
          description: no such container
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            application/json:
              example:
                message: "No such container: c2ada9df5af8"
        "500":
          description: cannot resize container
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /containers/{id}/start:
    post:
      tags:
        - Container
      summary: Start a container
      operationId: ContainerStart
      parameters:
        - name: id
          in: path
          description: ID or name of the container
          required: true
          schema:
            type: string
        - name: detachKeys
          in: query
          description: |
            Override the key sequence for detaching a container. Format is a
            single character `[a-Z]` or `ctrl-<value>` where `<value>` is one
            of: `a-z`, `@`, `^`, `[`, `,` or `_`.
          schema:
            type: string
      responses:
        "204":
          description: no error
          content: {}
        "304":
          description: container already started
          content: {}
        "404":
          description: no such container
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "No such container: c2ada9df5af8"
            text/plain:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            text/plain:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /containers/{id}/stop:
    post:
      tags:
        - Container
      summary: Stop a container
      operationId: ContainerStop
      parameters:
        - name: id
          in: path
          description: ID or name of the container
          required: true
          schema:
            type: string
        - name: signal
          in: query
          description: |
            Signal to send to the container as an integer or string (e.g. `SIGINT`).
          schema:
            type: string
        - name: t
          in: query
          description: Number of seconds to wait before killing the container
          schema:
            type: integer
      responses:
        "204":
          description: no error
          content: {}
        "304":
          description: container already stopped
          content: {}
        "404":
          description: no such container
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "No such container: c2ada9df5af8"
            text/plain:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            text/plain:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /containers/{id}/restart:
    post:
      tags:
        - Container
      summary: Restart a container
      operationId: ContainerRestart
      parameters:
        - name: id
          in: path
          description: ID or name of the container
          required: true
          schema:
            type: string
        - name: signal
          in: query
          description: |
            Signal to send to the container as an integer or string (e.g. `SIGINT`).
          schema:
            type: string
        - name: t
          in: query
          description: Number of seconds to wait before killing the container
          schema:
            type: integer
      responses:
        "204":
          description: no error
          content: {}
        "404":
          description: no such container
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "No such container: c2ada9df5af8"
            text/plain:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            text/plain:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /containers/{id}/kill:
    post:
      tags:
        - Container
      summary: Kill a container
      description: |
        Send a POSIX signal to a container, defaulting to killing to the
        container.
      operationId: ContainerKill
      parameters:
        - name: id
          in: path
          description: ID or name of the container
          required: true
          schema:
            type: string
        - name: signal
          in: query
          description: |
            Signal to send to the container as an integer or string (e.g. `SIGINT`).
          schema:
            type: string
            default: SIGKILL
      responses:
        "204":
          description: no error
          content: {}
        "404":
          description: no such container
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                message: "No such container: c2ada9df5af8"
            text/plain:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: container is not running
          content:
            application/json:
              schema:
