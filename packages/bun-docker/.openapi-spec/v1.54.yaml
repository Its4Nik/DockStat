          content:
            application/jsonl:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            application/x-ndjson:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            application/json-seq:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: server error
          content:
            application/jsonl:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            application/x-ndjson:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
            application/json-seq:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
