        Raft:
          type: object
          properties:
            SnapshotInterval:
              type: integer
              description: The number of log entries between snapshots.
              format: uint64
              example: 10000
            KeepOldSnapshots:
              type: integer
              description: |
                The number of snapshots to keep beyond the current snapshot.
