            - storage=ssd
            - production
          items:
            type: string
        ExperimentalBuild:
          type: boolean
          description: |
            Indicates if experimental features are enabled on the daemon.
          example: true
        ServerVersion:
          type: string
          description: |
            Version string of the daemon.
          example: 27.0.1
        Runtimes:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/Runtime"
          description: |
            List of [OCI compliant](https://github.com/opencontainers/runtime-spec)
            runtimes configured on the daemon. Keys hold the "name" used to
            reference the runtime.

            The Docker daemon relies on an OCI compliant runtime (invoked via the
            `containerd` daemon) as its interface to the Linux kernel namespaces,
            cgroups, and SELinux.

            The default runtime is `runc`, and automatically configured. Additional
            runtimes can be configured by the user and will be listed here.
          example:
            runc:
              path: runc
            runc-master:
              path: /go/bin/runc
            custom:
              path: /usr/local/bin/my-oci-runtime
              runtimeArgs:
                - --debug
                - --systemd-cgroup=false
        DefaultRuntime:
          type: string
          description: |
            Name of the default OCI runtime that is used when starting containers.

            The default can be overridden per-container at create time.
          example: runc
          default: runc
        Swarm:
          $ref: "#/components/schemas/SwarmInfo"
        LiveRestoreEnabled:
          type: boolean
          description: |
            Indicates if live restore is enabled.

            If enabled, containers are kept running when the daemon is shutdown
            or upon daemon start if running containers are detected.
          example: false
          default: false
        Isolation:
          type: string
          description: |
            Represents the isolation technology to use as a default for containers.
            The supported values are platform-specific.

            If no isolation value is specified on daemon start, on Windows client,
            the default is `hyperv`, and on Windows server, the default is `process`.

            This option is currently not used on other platforms.
          default: default
          enum:
            - default
            - hyperv
            - process
            - ""
        InitBinary:
          type: string
          description: |
            Name and, optional, path of the `docker-init` binary.

            If the path is omitted, the daemon searches the host's `$PATH` for the
            binary and uses the first result.
          example: docker-init
        ContainerdCommit:
          $ref: "#/components/schemas/Commit"
        RuncCommit:
          $ref: "#/components/schemas/Commit"
        InitCommit:
          $ref: "#/components/schemas/Commit"
        SecurityOptions:
          type: array
          description: |
            List of security features that are enabled on the daemon, such as
            apparmor, seccomp, SELinux, user-namespaces (userns), rootless and
            no-new-privileges.

            Additional configuration options for each security feature may
            be present, and are included as a comma-separated list of key/value
            pairs.
          example:
            - name=apparmor
            - "name=seccomp,profile=default"
            - name=selinux
            - name=userns
            - name=rootless
          items:
            type: string
        ProductLicense:
          type: string
          description: |
            Reports a summary of the product license on the daemon.

            If a commercial license has been applied to the daemon, information
            such as number of nodes, and expiration are included.
          example: Community Engine
        DefaultAddressPools:
          type: array
          description: |
            List of custom default address pools for local networks, which can be
            specified in the daemon.json file or dockerd option.

            Example: a Base "10.10.0.0/16" with Size 24 will define the set of 256
            10.10.[0-255].0/24 address pools.
          items:
            type: object
            properties:
              Base:
                type: string
                description: The network address in CIDR format
                example: 10.10.0.0/16
              Size:
                type: integer
                description: The network pool size
                example: 24
        FirewallBackend:
          $ref: "#/components/schemas/FirewallInfo"
        DiscoveredDevices:
          type: array
          description: |
            List of devices discovered by device drivers.

            Each device includes information about its source driver, kind, name,
            and additional driver-specific attributes.
          items:
            $ref: "#/components/schemas/DeviceInfo"
        NRI:
          $ref: "#/components/schemas/NRIInfo"
        Warnings:
          type: array
          description: |
            List of warnings / informational messages about missing features, or
            issues related to the daemon configuration.

            These messages can be printed by the client as information to the user.
          example:
            - "WARNING: No memory limit support"
          items:
            type: string
        CDISpecDirs:
          type: array
          description: |
            List of directories where (Container Device Interface) CDI
            specifications are located.

            These specifications define vendor-specific modifications to an OCI
            runtime specification for a container being created.

            An empty list indicates that CDI device injection is disabled.

            Note that since using CDI device injection requires the daemon to have
            experimental enabled. For non-experimental daemons an empty list will
            always be returned.
          example:
            - /etc/cdi
            - /var/run/cdi
          items:
            type: string
        Containerd:
          $ref: "#/components/schemas/ContainerdInfo"
    ContainerdInfo:
      type: object
      properties:
        Address:
          type: string
          description: The address of the containerd socket.
          example: /run/containerd/containerd.sock
        Namespaces:
          type: object
          properties:
            Containers:
              type: string
              description: |
                The default containerd namespace used for containers managed
                by the daemon.

                The default namespace for containers is "moby", but will be
                suffixed with the `<uid>.<gid>` of the remapped `root` if
                user-namespaces are enabled and the containerd image-store
                is used.
              example: moby
              default: moby
            Plugins:
              type: string
              description: |
                The default containerd namespace used for plugins managed by
                the daemon.

                The default namespace for plugins is "plugins.moby", but will be
                suffixed with the `<uid>.<gid>` of the remapped `root` if
                user-namespaces are enabled and the containerd image-store
                is used.
              example: plugins.moby
              default: plugins.moby
          description: |
            The namespaces that the daemon uses for running containers and
            plugins in containerd. These namespaces can be configured in the
            daemon configuration, and are considered to be used exclusively
            by the daemon, Tampering with the containerd instance may cause
            unexpected behavior.

            As these namespaces are considered to be exclusively accessed
            by the daemon, it is not recommended to change these values,
            or to change them to a value that is used by other systems,
            such as cri-containerd.
      description: |
        Information for connecting to the containerd instance that is used by the daemon.
        This is included for debugging purposes only.
      nullable: true
      x-nullable: true
    FirewallInfo:
      type: object
      properties:
        Driver:
          type: string
          description: |
            The name of the firewall backend driver.
          example: nftables
        Info:
          type: array
          description: |
            Information about the firewall backend, provided as
            "label" / "value" pairs.

            <p><br /></p>

            > **Note**: The information returned in this field, including the
            > formatting of values and labels, should not be considered stable,
            > and may change without notice.
          example:
            - - ReloadedAt
              - 2025-01-01T00:00:00Z
          items:
            type: array
            items:
              type: string
      description: |
        Information about the daemon's firewalling configuration.

        This field is currently only used on Linux, and omitted on other platforms.
      nullable: true
      x-nullable: true
    PluginsInfo:
      type: object
      properties:
        Volume:
          type: array
          description: "Names of available volume-drivers, and network-driver plugins."
          example:
            - local
          items:
            type: string
        Network:
          type: array
          description: "Names of available network-drivers, and network-driver plugins."
          example:
            - bridge
            - host
            - ipvlan
            - macvlan
            - "null"
            - overlay
          items:
            type: string
        Authorization:
          type: array
          description: Names of available authorization plugins.
          example:
            - img-authz-plugin
            - hbm
          items:
            type: string
        Log:
          type: array
          description: "Names of available logging-drivers, and logging-driver plugins."
          example:
            - awslogs
            - fluentd
            - gcplogs
            - gelf
            - journald
            - json-file
            - splunk
            - syslog
          items:
            type: string
      description: |
        Available plugins per type.

        <p><br /></p>

        > **Note**: Only unmanaged (V1) plugins are included in this list.
        > V1 plugins are "lazily" loaded, and are not returned in this list
        > if there is no resource using the plugin.
    RegistryServiceConfig:
      type: object
      properties:
        InsecureRegistryCIDRs:
          type: array
          description: |
            List of IP ranges of insecure registries, using the CIDR syntax
            ([RFC 4632](https://tools.ietf.org/html/4632)). Insecure registries
            accept un-encrypted (HTTP) and/or untrusted (HTTPS with certificates
            from unknown CAs) communication.

            By default, local registries (`::1/128` and `127.0.0.0/8`) are configured as
            insecure. All other registries are secure. Communicating with an
            insecure registry is not possible if the daemon assumes that registry
            is secure.

            This configuration override this behavior, insecure communication with
            registries whose resolved IP address is within the subnet described by
            the CIDR syntax.

            Registries can also be marked insecure by hostname. Those registries
            are listed under `IndexConfigs` and have their `Secure` field set to
            `false`.

            > **Warning**: Using this option can be useful when running a local
            > registry, but introduces security vulnerabilities. This option
            > should therefore ONLY be used for testing purposes. For increased
            > security, users should add their CA to their system's list of trusted
            > CAs instead of enabling this option.
          example:
            - ::1/128
            - 127.0.0.0/8
          items:
            type: string
        IndexConfigs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/IndexInfo"
          example:
            "127.0.0.1:5000":
              Name: 127.0.0.1:5000
              Mirrors: []
              Secure: false
              Official: false
            "[2001:db8:a0b:12f0::1]:80":
              Name: "[2001:db8:a0b:12f0::1]:80"
              Mirrors: []
              Secure: false
              Official: false
            docker.io:
              Name: docker.io
              Mirrors:
                - https://hub-mirror.corp.example.com:5000/
              Secure: true
              Official: true
            registry.internal.corp.example.com:3000:
              Name: registry.internal.corp.example.com:3000
              Mirrors: []
              Secure: false
              Official: false
        Mirrors:
          type: array
          description: |
            List of registry URLs that act as a mirror for the official
            (`docker.io`) registry.
          example:
            - https://hub-mirror.corp.example.com:5000/
            - "https://[2001:db8:a0b:12f0::1]/"
          items:
            type: string
      description: |
        RegistryServiceConfig stores daemon registry services configuration.
      nullable: true
      x-nullable: true
    IndexInfo:
      type: object
      properties:
        Name:
          type: string
          description: |
            Name of the registry, such as "docker.io".
          example: docker.io
        Mirrors:
          type: array
          description: |
            List of mirrors, expressed as URIs.
          example:
            - https://hub-mirror.corp.example.com:5000/
            - https://registry-2.docker.io/
            - https://registry-3.docker.io/
          items:
            type: string
        Secure:
          type: boolean
          description: |
            Indicates if the registry is part of the list of insecure
            registries.

            If `false`, the registry is insecure. Insecure registries accept
            un-encrypted (HTTP) and/or untrusted (HTTPS with certificates from
            unknown CAs) communication.

            > **Warning**: Insecure registries can be useful when running a local
            > registry. However, because its use creates security vulnerabilities
            > it should ONLY be enabled for testing purposes. For increased
            > security, users should add their CA to their system's list of
            > trusted CAs instead of enabling this option.
          example: true
        Official:
          type: boolean
          description: |
            Indicates whether this is an official registry (i.e., Docker Hub / docker.io)
          example: true
      description: IndexInfo contains information about a registry.
      nullable: true
      x-nullable: true
    Runtime:
      type: object
      properties:
        path:
          type: string
          description: |
            Name and, optional, path, of the OCI executable binary.

            If the path is omitted, the daemon searches the host's `$PATH` for the
            binary and uses the first result.
          example: /usr/local/bin/my-oci-runtime
        runtimeArgs:
          type: array
          description: |
            List of command-line arguments to pass to the runtime when invoked.
          nullable: true
          example:
            - --debug
            - --systemd-cgroup=false
          items:
            type: string
        status:
          type: object
          additionalProperties:
            type: string
          description: |
            Information specific to the runtime.

            While this API specification does not define data provided by runtimes,
            the following well-known properties may be provided by runtimes:

            `org.opencontainers.runtime-spec.features`: features structure as defined
            in the [OCI Runtime Specification](https://github.com/opencontainers/runtime-spec/blob/main/features.md),
            in a JSON string representation.

            <p><br /></p>

            > **Note**: The information returned in this field, including the
            > formatting of values and labels, should not be considered stable,
            > and may change without notice.
          nullable: true
          example:
            org.opencontainers.runtime-spec.features:
              "{\"ociVersionMin\":\"1.0.0\"\
              ,\"ociVersionMax\":\"1.1.0\",\"...\":\"...\"}"
      description: |
        Runtime describes an [OCI compliant](https://github.com/opencontainers/runtime-spec)
        runtime.

        The runtime is invoked by the daemon via the `containerd` daemon. OCI
        runtimes act as an interface to the Linux kernel namespaces, cgroups,
        and SELinux.
    Commit:
      type: object
      properties:
        ID:
          type: string
          description: Actual commit ID of external tool.
          example: cfb82a876ecc11b5ca0977d1733adbe58599088a
      description: |
        Commit holds the Git-commit (SHA1) that a binary was built from, as
        reported in the version-string of external tools, such as `containerd`,
        or `runC`.
    SwarmInfo:
      type: object
      properties:
        NodeID:
          type: string
          description: Unique identifier of for this node in the swarm.
          example: k67qz4598weg5unwwffg6z1m1
          default: ""
        NodeAddr:
          type: string
          description: |
            IP address at which this node can be reached by other nodes in the
            swarm.
          example: 10.0.0.46
          default: ""
        LocalNodeState:
          $ref: "#/components/schemas/LocalNodeState"
        ControlAvailable:
          type: boolean
          example: true
          default: false
        Error:
          type: string
          default: ""
        RemoteManagers:
          type: array
          description: |
            List of ID's and addresses of other managers in the swarm.
          nullable: true
          example:
            - NodeID: 71izy0goik036k48jg985xnds
              Addr: 10.0.0.158:2377
            - NodeID: 79y6h1o4gv8n120drcprv5nmc
              Addr: 10.0.0.159:2377
            - NodeID: k67qz4598weg5unwwffg6z1m1
              Addr: 10.0.0.46:2377
          items:
            $ref: "#/components/schemas/PeerNode"
        Nodes:
          type: integer
          description: Total number of nodes in the swarm.
          nullable: true
          example: 4
        Managers:
          type: integer
          description: Total number of managers in the swarm.
          nullable: true
          example: 3
        Cluster:
          $ref: "#/components/schemas/ClusterInfo"
      description: |
        Represents generic information about swarm.
    LocalNodeState:
      type: string
      description: Current local status of this node.
      example: active
      default: ""
      enum:
        - ""
        - inactive
        - pending
        - active
        - error
        - locked
    PeerNode:
      type: object
      properties:
        NodeID:
          type: string
          description: Unique identifier of for this node in the swarm.
        Addr:
          type: string
          description: |
            IP address and ports at which this node can be reached.
      description: Represents a peer-node in the swarm
    NetworkAttachmentConfig:
      type: object
      properties:
        Target:
          type: string
          description: |
            The target network for attachment. Must be a network name or ID.
        Aliases:
          type: array
          description: |
            Discoverable alternate names for the service on this network.
          items:
            type: string
        DriverOpts:
          type: object
          additionalProperties:
            type: string
          description: |
            Driver attachment options for the network target.
      description: |
        Specifies how a service should be attached to a particular network.
    EventActor:
      type: object
      properties:
        ID:
          type: string
          description: The ID of the object emitting the event
          example: ede54ee1afda366ab42f824e8a5ffd195155d853ceaec74a927f249ea270c743
        Attributes:
          type: object
          additionalProperties:
            type: string
          description: |
            Various key/value attributes of the object, depending on its type.
          example:
            com.example.some-label: some-label-value
            image: alpine:latest
            name: my-container
      description: |
        Actor describes something that generates events, like a container, network,
        or a volume.
    EventMessage:
      title: SystemEventsResponse
      type: object
      properties:
        Type:
          type: string
          description: The type of object emitting the event
          example: container
          enum:
            - builder
            - config
            - container
            - daemon
            - image
            - network
            - node
            - plugin
            - secret
            - service
            - volume
        Action:
          type: string
          description: The type of event
          example: create
        Actor:
          $ref: "#/components/schemas/EventActor"
        scope:
          type: string
          description: |
            Scope of the event. Engine events are `local` scope. Cluster (Swarm)
            events are `swarm` scope.
          enum:
            - local
            - swarm
        time:
          type: integer
          description: Timestamp of event
          format: int64
          example: 1629574695
        timeNano:
          type: integer
          description: "Timestamp of event, with nanosecond accuracy"
          format: int64
          example: 1629574695515050031
      description: |
        EventMessage represents the information an event contains.
    OCIDescriptor:
      type: object
      properties:
        mediaType:
          type: string
          description: |
            The media type of the object this schema refers to.
          example: application/vnd.oci.image.manifest.v1+json
        digest:
          type: string
          description: |
            The digest of the targeted content.
          example: sha256:c0537ff6a5218ef531ece93d4984efc99bbf3f7497c0a7726c88e2bb7584dc96
        size:
          type: integer
          description: |
            The size in bytes of the blob.
          format: int64
          example: 424
        urls:
          type: array
          description: List of URLs from which this object MAY be downloaded.
          nullable: true
          items:
            type: string
            format: uri
        annotations:
          type: object
          additionalProperties:
            type: string
          description: Arbitrary metadata relating to the targeted content.
          nullable: true
          example:
            com.docker.official-images.bashbrew.arch: amd64
            org.opencontainers.image.base.digest: sha256:0d0ef5c914d3ea700147da1bd050c59edb8bb12ca312f3800b29d7c8087eabd8
            org.opencontainers.image.base.name: scratch
            org.opencontainers.image.created: 2025-01-27T00:00:00Z
            org.opencontainers.image.revision: 9fabb4bad5138435b01857e2fe9363e2dc5f6a79
            org.opencontainers.image.source: https://git.launchpad.net/cloud-images/+oci/ubuntu-base
            org.opencontainers.image.url: https://hub.docker.com/_/ubuntu
            org.opencontainers.image.version: "24.04"
        data:
          type: string
          description: |-
            Data is an embedding of the targeted content. This is encoded as a base64
            string when marshalled to JSON (automatically, by encoding/json). If
            present, Data can be used directly to avoid fetching the targeted content.
          nullable: true
          example: "null"
        platform:
          $ref: "#/components/schemas/OCIPlatform"
        artifactType:
          type: string
          description: ArtifactType is the IANA media type of this artifact.
          nullable: true
          example: "null"
      description: |
        A descriptor struct containing digest, media type, and size, as defined in
        the [OCI Content Descriptors Specification](https://github.com/opencontainers/image-spec/blob/v1.0.1/descriptor.md).
      x-go-name: Descriptor
    OCIPlatform:
      type: object
      properties:
        architecture:
          type: string
          description: |
            The CPU architecture, for example `amd64` or `ppc64`.
          example: arm
        os:
          type: string
          description: |
            The operating system, for example `linux` or `windows`.
          example: windows
        os.version:
          type: string
          description: |
            Optional field specifying the operating system version, for example on
            Windows `10.0.19041.1165`.
          example: 10.0.19041.1165
        os.features:
          type: array
          description: |
            Optional field specifying an array of strings, each listing a required
            OS feature (for example on Windows `win32k`).
          example:
            - win32k
          items:
            type: string
        variant:
          type: string
          description: |
            Optional field specifying a variant of the CPU, for example `v7` to
            specify ARMv7 when architecture is `arm`.
          example: v7
      description: |
        Describes the platform which the image in the manifest runs on, as defined
        in the [OCI Image Index Specification](https://github.com/opencontainers/image-spec/blob/v1.0.1/image-index.md).
      nullable: true
      x-go-name: Platform
      x-nullable: true
    DistributionInspect:
      title: DistributionInspectResponse
      required:
        - Descriptor
        - Platforms
      type: object
      properties:
        Descriptor:
          $ref: "#/components/schemas/OCIDescriptor"
        Platforms:
          type: array
          description: |
            An array containing all platforms supported by the image.
          items:
            $ref: "#/components/schemas/OCIPlatform"
      description: |
        Describes the result obtained from contacting the registry to retrieve
        image metadata.
      x-go-name: DistributionInspect
    ClusterVolume:
      type: object
      properties:
        ID:
          type: string
          description: |
            The Swarm ID of this volume. Because cluster volumes are Swarm
            objects, they have an ID, unlike non-cluster volumes. This ID can
            be used to refer to the Volume instead of the name.
        Version:
          $ref: "#/components/schemas/ObjectVersion"
        CreatedAt:
          type: string
          format: dateTime
        UpdatedAt:
          type: string
          format: dateTime
        Spec:
          $ref: "#/components/schemas/ClusterVolumeSpec"
        Info:
          type: object
          properties:
            CapacityBytes:
              type: integer
              description: |
                The capacity of the volume in bytes. A value of 0 indicates that
                the capacity is unknown.
              format: int64
            VolumeContext:
              type: object
              additionalProperties:
                type: string
              description: |
                A map of strings to strings returned from the storage plugin when
                the volume is created.
            VolumeID:
              type: string
              description: |
                The ID of the volume as returned by the CSI storage plugin. This
                is distinct from the volume's ID as provided by Docker. This ID
                is never used by the user when communicating with Docker to refer
                to this volume. If the ID is blank, then the Volume has not been
                successfully created in the plugin yet.
            AccessibleTopology:
              type: array
              description: |
                The topology this volume is actually accessible from.
              items:
                $ref: "#/components/schemas/Topology"
          description: |
            Information about the global status of the volume.
        PublishStatus:
          type: array
          description: |
            The status of the volume as it pertains to its publishing and use on
            specific nodes
          items:
            type: object
            properties:
              NodeID:
                type: string
                description: |
                  The ID of the Swarm node the volume is published on.
              State:
                type: string
                description: |
                  The published state of the volume.
                  * `pending-publish` The volume should be published to this node, but the call to the controller plugin to do so has not yet been successfully completed.
                  * `published` The volume is published successfully to the node.
                  * `pending-node-unpublish` The volume should be unpublished from the node, and the manager is awaiting confirmation from the worker that it has done so.
                  * `pending-controller-unpublish` The volume is successfully unpublished from the node, but has not yet been successfully unpublished on the controller.
                enum:
                  - pending-publish
                  - published
                  - pending-node-unpublish
                  - pending-controller-unpublish
              PublishContext:
                type: object
                additionalProperties:
                  type: string
                description: |
                  A map of strings to strings returned by the CSI controller
                  plugin when a volume is published.
      description: |
        Options and information specific to, and only present on, Swarm CSI
        cluster volumes.
    ClusterVolumeSpec:
      type: object
      properties:
        Group:
          type: string
          description: |
            Group defines the volume group of this volume. Volumes belonging to
            the same group can be referred to by group name when creating
            Services.  Referring to a volume by group instructs Swarm to treat
            volumes in that group interchangeably for the purpose of scheduling.
            Volumes with an empty string for a group technically all belong to
            the same, emptystring group.
        AccessMode:
          type: object
          properties:
            Scope:
              type: string
              description: |
                The set of nodes this volume can be used on at one time.
                - `single` The volume may only be scheduled to one node at a time.
                - `multi` the volume may be scheduled to any supported number of nodes at a time.
              nullable: false
              default: single
              enum:
                - single
                - multi
            Sharing:
              type: string
              description: |
                The number and way that different tasks can use this volume
                at one time.
                - `none` The volume may only be used by one task at a time.
                - `readonly` The volume may be used by any number of tasks, but they all must mount the volume as readonly
                - `onewriter` The volume may be used by any number of tasks, but only one may mount it as read/write.
                - `all` The volume may have any number of readers and writers.
              nullable: false
              default: none
              enum:
                - none
                - readonly
                - onewriter
                - all
            MountVolume:
              type: object
              properties: {}
              description: |
                Options for using this volume as a Mount-type volume.

                    Either MountVolume or BlockVolume, but not both, must be
                    present.
                  properties:
                    FsType:
                      type: "string"
                      description: |
                        Specifies the filesystem type for the mount volume.
                        Optional.
                    MountFlags:
                      type: "array"
                      description: |
                        Flags to pass when mounting the volume. Optional.
                      items:
                        type: "string"
                BlockVolume:
                  type: "object"
                  description: |
                    Options for using this volume as a Block-type volume.
                    Intentionally empty.
            Secrets:
              type: array
              description: |
                Swarm Secrets that are passed to the CSI storage plugin when
                operating on this volume.
              items:
                type: object
                properties:
                  Key:
                    type: string
                    description: |
                      Key is the name of the key of the key-value pair passed to
                      the plugin.
                  Secret:
                    type: string
                    description: |
                      Secret is the swarm Secret object from which to read data.
                      This can be a Secret name or ID. The Secret data is
                      retrieved by swarm and used as the value of the key-value
                      pair passed to the plugin.
                description: |
                  One cluster volume secret entry. Defines a key-value pair that
                  is passed to the plugin.
            AccessibilityRequirements:
              type: object
              properties:
                Requisite:
                  type: array
                  description: |
                    A list of required topologies, at least one of which the
                    volume must be accessible from.
                  items:
                    $ref: "#/components/schemas/Topology"
                Preferred:
                  type: array
                  description: |
                    A list of topologies that the volume should attempt to be
                    provisioned in.
                  items:
                    $ref: "#/components/schemas/Topology"
              description: |
                Requirements for the accessible topology of the volume. These
                fields are optional. For an in-depth description of what these
                fields mean, see the CSI specification.
            CapacityRange:
              type: object
              properties:
                RequiredBytes:
                  type: integer
                  description: |
                    The volume must be at least this big. The value of 0
                    indicates an unspecified minimum
                  format: int64
                LimitBytes:
                  type: integer
                  description: |
                    The volume must not be bigger than this. The value of 0
                    indicates an unspecified maximum.
                  format: int64
              description: |
                The desired capacity that the volume should be created with. If
                empty, the plugin will decide the capacity.
            Availability:
              type: string
              description: |
                The availability of the volume for use in tasks.
                - `active` The volume is fully available for scheduling on the cluster
                - `pause` No new workloads should use the volume, but existing workloads are not stopped.
                - `drain` All workloads using this volume should be stopped and rescheduled, and no new ones should be started.
              nullable: false
              default: active
              enum:
                - active
                - pause
                - drain
          description: |
            Defines how the volume is used by tasks.
      description: |
        Cluster-specific options used to create the volume.
    Topology:
      type: object
      additionalProperties:
        type: string
      description: |
        A map of topological domains to topological segments. For in depth
        details, see documentation for the Topology object in the CSI
        specification.
    ImageManifestSummary:
      required:
        - Available
        - Descriptor
        - ID
        - Kind
        - Size
      type: object
      properties:
        ID:
          type: string
          description: |
            ID is the content-addressable ID of an image and is the same as the
            digest of the image manifest.
          example: sha256:95869fbcf224d947ace8d61d0e931d49e31bb7fc67fffbbe9c3198c33aa8e93f
        Descriptor:
          $ref: "#/components/schemas/OCIDescriptor"
        Available:
          type: boolean
          description:
            "Indicates whether all the child content (image config, layers)\
            \ is fully available locally."
          example: true
        Size:
          required:
            - Content
            - Total
          type: object
          properties:
            Total:
              type: integer
              description: |
                Total is the total size (in bytes) of all the locally present
                data (both distributable and non-distributable) that's related to
                this manifest and its children.
                This equal to the sum of [Content] size AND all the sizes in the
                [Size] struct present in the Kind-specific data struct.
                For example, for an image kind (Kind == "image")
                this would include the size of the image content and unpacked
                image snapshots ([Size.Content] + [ImageData.Size.Unpacked]).
              format: int64
              example: 8213251
            Content:
              type: integer
              description: |
                Content is the size (in bytes) of all the locally present
                content in the content store (e.g. image config, layers)
                referenced by this manifest and its children.
                This only includes blobs in the content store.
              format: int64
              example: 3987495
          nullable: false
        Kind:
          type: string
          description: |
            The kind of the manifest.

            kind         | description
            -------------|-----------------------------------------------------------
            image        | Image manifest that can be used to start a container.
            attestation  | Attestation manifest produced by the Buildkit builder for a specific image manifest.
          example: image
          enum:
            - image
            - attestation
            - unknown
        ImageData:
          required:
            - Containers
            - Platform
            - Size
          type: object
          properties:
            Platform:
              $ref: "#/components/schemas/OCIPlatform"
            Identity:
              $ref: "#/components/schemas/Identity"
            Containers:
              type: array
              description: |
                The IDs of the containers that are using this image.
              example:
                - ede54ee1fda366ab42f824e8a5ffd195155d853ceaec74a927f249ea270c7430
                - abadbce344c096744d8d6071a90d474d28af8f1034b5ea9fb03c3f4bfc6d005e
              items:
                type: string
            Size:
              required:
                - Unpacked
              type: object
              properties:
                Unpacked:
                  type: integer
                  description: |
                    Unpacked is the size (in bytes) of the locally unpacked
                    (uncompressed) image content that's directly usable by the containers
                    running this image.
                    It's independent of the distributable content - e.g.
                    the image might still have an unpacked data that's still used by
                    some container even when the distributable/compressed content is
                    already gone.
                  format: int64
                  example: 3987495
              nullable: false
          description: |
            The image data for the image manifest.
            This field is only populated when Kind is "image".
          nullable: true
          x-omitempty: true
        AttestationData:
          required:
            - For
          type: object
          properties:
            For:
              type: string
              description: |
                The digest of the image manifest that this attestation is for.
              example: sha256:95869fbcf224d947ace8d61d0e931d49e31bb7fc67fffbbe9c3198c33aa8e93f
          description: |
            The image data for the attestation manifest.
            This field is only populated when Kind is "attestation".
          nullable: true
          x-omitempty: true
      description: |
        ImageManifestSummary represents a summary of an image manifest.
      x-go-name: ManifestSummary
x-original-swagger-version: "2.0"
