  /images/{name}/get:
    get:
      tags:
        - Image
      summary: Export an image
      description: |
        Get a tarball containing all images and metadata for a repository.

        If `name` is a specific name and tag (e.g. `ubuntu:latest`), then only that image (and its parents) are returned. If `name` is an image ID, similarly only that image (and its parents) are returned, but with the exclusion of the `repositories` file in the tarball, as there were no image names referenced.

        ### Image tarball format

        An image tarball contains [Content as defined in the OCI Image Layout Specification](https://github.com/opencontainers/image-spec/blob/v1.1.1/image-layout.md#content).

        Additionally, includes the manifest.json file associated with a backwards compatible docker save format.

        If the tarball defines a repository, the tarball should also include a `repositories` file at the root that contains a list of repository and tag names mapped to layer IDs.

        ```json
        {
          "hello-world": {
            "latest": "565a9d68a73f6706862bfe8409a7f659776d4d60a8d096eb4a3cbce6999cc2a1"
          }
        }
        ```
      operationId: ImageGet
      parameters:
        - name: name
          in: path
          description: Image name or ID
          required: true
          schema:
            type: string
        - name: platform
          in: query
          description: |
            JSON encoded OCI platform describing a platform which will be used
            to select a platform-specific image to be saved if the image is
            multi-platform.
            If not provided, the full multi-platform image will be saved.

            Example: `{"os": "linux", "architecture": "arm", "variant": "v5"}`
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: no error
          content:
            application/x-tar:
              schema:
                type: string
                format: binary
        "500":
          description: server error
          content:
            application/x-tar:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /images/get:
    get:
      tags:
